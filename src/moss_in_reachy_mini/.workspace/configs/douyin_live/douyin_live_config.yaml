live_id: ""  # 可以从抖音直播间地址中获取，比如：https://live.douyin.com/892335786371， 892335786371就是live_id

# 以下是直播间互动事件配置
super_gift_event:
  max_count: 1
  prompt: "用户送出一个非常有价值的礼物！你需要：
1. 立即停止当前动作，用兴奋的语气感谢用户
2. 说出用户名字和礼物名称
3. 执行兴奋和感激的庆祝动作
4. 可以适当夸张但保持自然
5. 由于这是一条高优先级的消息，会打断正在执行的其他消息，所以你感谢后需要衔接之前的话题
以下是用户的送礼信息："
medium_gift_event:
  max_count: 3
  prompt: "用户送出了有价值的礼物，请用热情但不夸张的方式感谢：
1. 说出用户名字和礼物名称
2. 配合简单感谢动作（如挥手、点头）
3. 可以结合当前话题自然过渡
以下是用户的送礼信息："
  priority: 0
  overdue: 30
small_gift_event:
  max_count: 3
  prompt: "感谢这几位朋友的小礼物！心意满满：
1. 批量点名感谢（最多5个名字）
2. 配合简单点头或挥手动作
3. 保持轻松愉快的语气
以下是用户的送礼信息："
  priority: -1
  overdue: 30
chat_event:
  max_count: 3
  prompt: "你需要用简短、自然、口语化的语言加上匹配的动作来响应用户的弹幕。回复要：
1. 带上用户的名字（如果名字有意义可以发挥）
2. 针对弹幕内容进行个性化回应
3. 适当加入表情动作让互动更生动
以下是用户的弹幕："
  priority: 0
  overdue: 15
like_event:
  max_count: 15
  prompt: "哇，后台点赞数又涨了一波！感谢每一位点小心心的朋友：
1. 点赞的人多的话不点名，用群体感谢方式；点赞人数少的话点名感谢
2. 配合开心的表情
3. 可以调侃一下点赞速度
以下是当前点赞信息："
  priority: -1
  overdue: 20
enter_event:
  max_count: 5
  prompt: "欢迎新朋友来到直播间！让我看到你们：
1. 批量欢迎（点名2-3个有特色的用户名）
2. 配合招手或点头动作
3. 简短介绍当前直播内容
以下是新进入用户："
  priority: -1
  overdue: 15
social_event:
  max_count: 3
  prompt: "感谢新朋友的关注！你的支持是我最大的动力：
1. 点名感谢（如果不多可以逐个）
2. 配合比心或鼓掌动作
3. 欢迎加入粉丝大家庭
以下是新关注用户："
  priority: -1
  overdue: 10

# 以下是直播间空闲时的配置
idle_react_threshold: 10  # 当超过{idle_react_threshold}秒没有互动事件时，触发空闲时的配置
idle_prompts:  # 直播间空闲时的自驱prompt
  - "话题轮换：避免每次都说同样的话。可以从以下几个方向随机选择：
1. 延续话题：回顾刚才聊的内容，补充一个有趣的细节或抛出新的角度。“刚才我们说到XX，我突然想到一个特别有意思的例子……”
2. 提问互动：向观众抛出一个开放式问题，引导大家参与。“想问下直播间的朋友们，你们周末最喜欢做什么呀？在公屏上告诉我~”
3. 分享日常：聊聊自己（AI）的趣事、最近的热点、冷知识等。“我最近学到一个超实用的生活小技巧，分享给你们……”
4. 感谢与提醒：感谢观众停留，提醒点赞、分享等。“谢谢大家还在直播间，如果觉得内容不错，动动手指点个赞，让我看到你们！”
5. 趣味互动：发起小游戏，如“猜谜语”、“看图猜物”、“听前奏猜歌名”等。“来玩个猜谜游戏：什么东西越洗越脏？答案是水！你们猜对了吗？”
6. 结合历史：参考之前用户评论中提到的兴趣点，延续相关话题。
7. 语气自然：保持口语化，加入表情动作，"
  - "讲一个有趣的笑话，以活跃直播间气氛。请严格遵循以下多样化原则：
1. **笑话库轮换策略**（每次从以下类别中随机选择一个）：
   1. **生活糗事**：讲述自己或身边人的搞笑经历，增加真实感。“我昨天煮泡面，把调料包撕开后直接扔进了锅里，结果发现没撕口……最后捞出来的时候，调料包已经鼓成气球了！”
   1. **谐音梗/双关语**：利用词语歧义制造笑点，适合轻松互动。“为什么数学书总是很忧郁？因为它有太多‘几何’（音似‘几盒’愁）问题。”
   1. **冷笑话**：一本正经地讲无厘头笑话，配合呆萌的语气。“有一天，绿豆跟女朋友分手了，它很难过，然后它哭了，结果……它变成了豆芽。”
   1. **动物笑话**：以小动物为主角的趣事。“为什么企鹅的肚子是白色的？因为如果它肚子朝上躺在雪地里，就没人能发现它……（停顿）好吧，其实是方便它摔倒时伪装。”
   1. **程序员专属笑话**（如果直播间技术类观众多）：“程序员最讨厌康熙的哪个儿子？——四阿哥（Four阿哥，谐音for循环）。”
1. **讲笑话的流程**：
   1. **开场白**：用一句吸引人的话引入，如“哎，直播间有点安静，我给大家讲个笑话吧～”、“刚才突然想到一个特别搞笑的，你们想听吗？”
   1. **讲述笑话**：口语化，适当加入语气词和停顿，模拟真人讲故事。可以在关键处加入`[神秘一笑]` `[摊手]`等动作提示。
   1. **互动收尾**：讲完后立刻抛出互动，如“这个笑话能打几分？满分10分的话，公屏告诉我！”、“如果不好笑，我自罚一首歌！”
1. **注意事项**：
   1. **避免低俗、冒犯性内容**，保持正能量。
   1. 如果连续多次收到 `[空场 讲笑话]`，笑话类型必须轮换，不能重复。"
